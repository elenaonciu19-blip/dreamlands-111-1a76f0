<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 for someone special</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Caveat:wght@600&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;
  background:radial-gradient(900px 500px at 75% 12%,#1d4036 0%,#14302a 45%,#0c1d18 100%);color:#f7ecd4;overflow:hidden}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.star{position:fixed;border-radius:50%;background:#ffe9a8;box-shadow:0 0 8px 2px rgba(255,233,168,.7);animation:twinkle 3s ease-in-out infinite}
.box{text-align:center;max-width:380px;padding:30px;position:relative;z-index:2}
.moon{font-size:3.2rem;margin-bottom:10px}
h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1.2}
.sub{font-family:'Caveat',cursive;font-size:1.3rem;color:#e8c98e;margin:10px 0 26px}
input{width:100%;padding:14px 18px;border-radius:999px;border:2px solid rgba(217,166,83,.5);background:rgba(255,255,255,.07);
  color:#f7ecd4;font-size:1.2rem;text-align:center;outline:none;letter-spacing:.3em;font-family:'Nunito',sans-serif}
input:focus{border-color:#d9a653}
input::placeholder{letter-spacing:0;color:rgba(247,236,212,.4)}
button{margin-top:16px;padding:13px 38px;border-radius:999px;border:2px solid #d9a653;cursor:pointer;
  background:linear-gradient(135deg,#c2495d,#7e1f30);color:#f5d98a;font-weight:800;font-size:1rem;font-family:'Nunito',sans-serif;transition:transform .2s}
button:hover{transform:scale(1.06)}
.hint{margin-top:20px;font-size:.8rem;color:rgba(207,220,210,.65)}
.err{min-height:1.4em;margin-top:12px;font-family:'Caveat',cursive;font-size:1.15rem;color:#e89aa6}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .35s}
.load{display:none;margin-top:14px;color:#e8c98e;font-family:'Caveat',cursive;font-size:1.2rem}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="moon">🌕🐺</div>
  <h1>This book belongs<br>to two people.</h1>
  <div class="sub">if you are one of them, you already know the key</div>
  <input type="password" id="pw" placeholder="enter the password" autocomplete="off">
  <br><button onclick="unlock()">Unlock ❤️</button>
  <div class="err" id="err">&nbsp;</div>
  <div class="load" id="load">opening the dreamlands…</div>
  <div class="hint">hint: the wolf + his girl + a very nice number 😏</div>
</div>

  s.style.width=s.style.height=(1.5+Math.random()*2.5)+'px';
  s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';
  s.style.animationDelay=Math.random()*3+'s';document.body.appendChild(s)}
async function tryKey(pw){
  const data=Uint8Array.from(atob(C),c=>c.charCodeAt(0));
  const salt=data.slice(8,16), ct=data.slice(16);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:600000,hash:'SHA-256'},km,384);
  const kb=new Uint8Array(bits);
  const key=await crypto.subtle.importKey('raw',kb.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:kb.slice(32,48)},key,ct);
  const html=new TextDecoder().decode(pt);
  if(!html.startsWith('<!DOCTYPE html>'))throw new Error('bad');
  return html;
}
async function unlock(auto){
  const pw=auto||document.getElementById('pw').value.trim();
  if(!pw)return;
  document.getElementById('load').style.display='block';
  document.getElementById('err').innerHTML='&nbsp;';
  try{
    const html=await tryKey(pw);
    try{localStorage.setItem('wolfy-key',pw)}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('load').style.display='none';
    if(!auto){
      const b=document.getElementById('box');b.classList.remove('shake');void b.offsetWidth;b.classList.add('shake');
      document.getElementById('err').textContent='not quite, stranger 🐺';
    }
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
try{const k=localStorage.getItem('wolfy-key');if(k)unlock(k)}catch(e){}
